<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Runner | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050000;
            font-family: 'Courier New', Courier, monospace;
            color: #ffb4ab;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(15, 0, 0, 0.7);
            border: 1px solid rgba(255, 180, 171, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #ff897d;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 180, 171, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(15, 0, 0, 0.8);
            border: 1px solid rgba(255, 180, 171, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #ffb4ab;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">SHIELD INTEGRITY</div>
            <div class="hud-value" id="shield-val">100%</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">VOID DEPTH</div>
            <div class="hud-value" id="dist-val">0 M</div>
        </div>
    </div>
    
    <div class="instructions">
        Use <span class="key">A</span>/<span class="key">D</span> to steer, <span class="key">SPACE</span> to jump/double-jump, and <span class="key">SHIFT</span> to dash.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050000, 0.02);

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 12);
        camera.lookAt(0, 1, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(scene.fog.color);
        container.appendChild(renderer.domElement);

        // Lights
        const light = new THREE.DirectionalLight(0xffb4ab, 1.0);
        light.position.set(0, 10, 5);
        scene.add(light);

        const ambient = new THREE.AmbientLight(0x111111);
        scene.add(ambient);

        // Dynamic runner path
        const pathGeom = new THREE.BoxGeometry(10, 0.2, 200);
        const pathMat = new THREE.MeshStandardMaterial({
            color: 0x220000,
            roughness: 0.8,
            metalness: 0.2,
            wireframe: true
        });
        const path = new THREE.Mesh(pathGeom, pathMat);
        path.position.set(0, -0.1, -80);
        scene.add(path);

        const path2 = new THREE.Mesh(pathGeom, pathMat);
        path2.position.set(0, -0.1, -280);
        scene.add(path2);

        // Obstacles array
        const obstacles = [];
        const particles = [];

        // Player cube
        const playerGeom = new THREE.BoxGeometry(1.2, 1.2, 1.2);
        const playerMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            wireframe: true,
            roughness: 0.1
        });
        const player = new THREE.Mesh(playerGeom, playerMat);
        player.position.set(0, 0.6, 0);
        scene.add(player);

        // Game states
        let distance = 0;
        let shields = 100;
        let speed = 30; // base running speed
        let dashTimer = 0;
        let isDashing = false;

        // Player physics
        let py = 0.6;
        let vy = 0;
        let gravity = -30;
        let jumpPower = 11;
        let jumpsLeft = 2;
        let targetX = 0;
        let px = 0;

        // Keyboard handler
        const keys = { a: false, d: false, space: false, shift: false };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === ' ') {
                if (jumpsLeft > 0) {
                    vy = jumpPower;
                    jumpsLeft--;
                    createGlow(player.position, 0xff5555, 6);
                }
            }
            if (e.key === 'Shift') {
                if (!isDashing) {
                    isDashing = true;
                    dashTimer = 0.25; // dash length
                    speed = 70;
                    playerMat.color.setHex(0xff3333);
                }
            }
            if (k in keys) keys[k] = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k in keys) keys[k] = false;
        });

        // Trigger warp effect on mouse click
        window.addEventListener('mousedown', () => {
            createGlow(player.position, 0xffffff, 12);
        });

        function createGlow(pos, color, count) {
            const pGroup = new THREE.Group();
            const pGeom = new THREE.SphereGeometry(0.1, 4, 4);
            const pMat = new THREE.MeshBasicMaterial({color: color});
            const pList = [];
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(pGeom, pMat);
                mesh.position.copy(pos);
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8
                );
                pGroup.add(mesh);
                pList.push({mesh, vel});
            }
            scene.add(pGroup);
            particles.push({group: pGroup, list: pList, age: 0, life: 0.4});
        }

        // Spawn obstacles
        let spawnTimer = 0;
        function spawnObstacle() {
            // lanes: left (-3.5), center (0), right (3.5)
            const lanes = [-3, 0, 3];
            const lane = lanes[Math.floor(Math.random() * lanes.length)];
            const size = 1.0 + Math.random()*1.0;
            const geom = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xff3b30,
                wireframe: true
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(lane, size/2, -180);
            scene.add(mesh);
            obstacles.push(mesh);
        }

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Dash timers
            if (isDashing) {
                dashTimer -= delta;
                if (dashTimer <= 0) {
                    isDashing = false;
                    speed = 30;
                    playerMat.color.setHex(0xffffff);
                }
            }

            // Lane movement (A/D)
            if (keys.a) {
                targetX = Math.max(targetX - 10 * delta, -3.5);
            } else if (keys.d) {
                targetX = Math.min(targetX + 10 * delta, 3.5);
            }
            px += (targetX - px) * 0.15; // Smooth spring lerp
            player.position.x = px;

            // Gravity jump physics
            vy += gravity * delta;
            py += vy * delta;
            if (py <= 0.6) {
                py = 0.6;
                vy = 0;
                jumpsLeft = 2; // reset double jumps
            }
            player.position.y = py;

            // Spin player mesh slightly
            player.rotation.x += 0.5 * delta * (speed / 30);
            player.rotation.y += 0.8 * delta;

            // Scroll the paths
            const scrollDistance = speed * delta;
            distance += scrollDistance;
            document.getElementById('dist-val').textContent = `${Math.round(distance)} M`;

            path.position.z += scrollDistance;
            path2.position.z += scrollDistance;
            if (path.position.z > 120) path.position.z -= 400;
            if (path2.position.z > 120) path2.position.z -= 400;

            // Spawn obstacles
            spawnTimer += delta * (speed / 30);
            if (spawnTimer > 1.0) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // Move & check obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += scrollDistance;

                // Collision Check
                const pBox = new THREE.Box3().setFromObject(player);
                const oBox = new THREE.Box3().setFromObject(obs);

                if (pBox.intersectsBox(oBox)) {
                    // Explode obstacle!
                    createGlow(obs.position, 0xff0000, 15);
                    scene.remove(obs);
                    obstacles.splice(i, 1);

                    // Reduce shields
                    shields = Math.max(shields - 20, 0);
                    document.getElementById('shield-val').textContent = `${shields}%`;
                    if (shields === 0) {
                        document.getElementById('shield-val').textContent = 'CRITICAL';
                        document.getElementById('shield-val').style.color = '#ff3b30';
                    }

                    // Flash camera shaking
                    camera.position.x += (Math.random() - 0.5) * 0.5;
                    continue;
                }

                // Remove out-of-bounds obstacles
                if (obs.position.z > 20) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            // Animate glow particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const pObj = particles[i];
                pObj.age += delta;
                if (pObj.age >= pObj.life) {
                    scene.remove(pObj.group);
                    particles.splice(i, 1);
                } else {
                    pObj.list.forEach(p => {
                        p.mesh.position.addScaledVector(p.vel, delta);
                    });
                }
            }

            // Dynamic camera spring follow
            camera.position.x = px * 0.7;
            camera.rotation.y = -px * 0.02;
            
            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
