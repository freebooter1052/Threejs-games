<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Breaker | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000408;
            font-family: 'Courier New', Courier, monospace;
            color: #d2bbff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(0, 8, 16, 0.7);
            border: 1px solid rgba(192, 193, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #8083ff;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(128, 131, 255, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(0, 8, 16, 0.8);
            border: 1px solid rgba(192, 193, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #c0c1ff;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">CPU SHIELD POWER</div>
            <div class="hud-value" id="cpu-val">100%</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">VIRUSES CORRUPTED</div>
            <div class="hud-value" id="score-val">0</div>
        </div>
    </div>
    
    <div class="instructions">
        Select Node: <span class="key">1-5</span>. Space to speed up. Click empty tile on grid to build laser node towers.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 18);
        camera.lookAt(0, -1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x02070f);
        container.appendChild(renderer.domElement);

        // Grid Board ( Motherboard Circuit )
        const boardSize = 12;
        const gridHelper = new THREE.GridHelper(24, 24, 0x00ff88, 0x113322);
        gridHelper.position.y = -0.1;
        scene.add(gridHelper);

        // Path (motherboard traces)
        const tracePoints = [
            new THREE.Vector3(-10, 0, -10),
            new THREE.Vector3(-4, 0, -10),
            new THREE.Vector3(-4, 0, 0),
            new THREE.Vector3(4, 0, 0),
            new THREE.Vector3(4, 0, 10),
            new THREE.Vector3(10, 0, 10)
        ];
        
        const traceGeom = new THREE.BufferGeometry().setFromPoints(tracePoints);
        const traceMat = new THREE.LineBasicMaterial({ color: 0x00ffcc, linewidth: 2 });
        const traceLine = new THREE.Line(traceGeom, traceMat);
        scene.add(traceLine);

        // CPU Core Node representation
        const cpuGeom = new THREE.BoxGeometry(2, 0.5, 2);
        const cpuMat = new THREE.MeshStandardMaterial({color: 0x00ff88, wireframe: true});
        const cpu = new THREE.Mesh(cpuGeom, cpuMat);
        cpu.position.copy(tracePoints[tracePoints.length - 1]);
        scene.add(cpu);

        const light = new THREE.DirectionalLight(0x00ffcc, 1);
        light.position.set(0, 10, 5);
        scene.add(light);

        // Entities arrays
        const towers = [];
        const enemies = [];
        const lasers = [];
        const particles = [];

        // Game states
        let cpuHealth = 100;
        let score = 0;
        let selectedNode = 1;
        let timeScale = 1.0;

        // Key states
        window.addEventListener('keydown', (e) => {
            const keyNum = parseInt(e.key);
            if (keyNum >= 1 && keyNum <= 5) {
                selectedNode = keyNum;
            }
            if (e.key === ' ') {
                timeScale = 3.0; // Fast Forward
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === ' ') {
                timeScale = 1.0;
            }
        });

        // Click to place towers on grid
        const mouse = new THREE.Vector2();
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Raycast intersection plane at y=0
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const intersectPoint = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, intersectPoint)) {
                // Snap to Grid (1x1 cells)
                const gridX = Math.round(intersectPoint.x);
                const gridZ = Math.round(intersectPoint.z);

                // Check distance to trace line to prevent blockages
                let nearTrace = false;
                for(let i=0; i<tracePoints.length - 1; i++) {
                    const p1 = tracePoints[i];
                    const p2 = tracePoints[i+1];
                    const lineSegment = new THREE.Line3(p1, p2);
                    const closest = new THREE.Vector3();
                    lineSegment.closestPointToPoint(new THREE.Vector3(gridX, 0, gridZ), true, closest);
                    if (closest.distanceTo(new THREE.Vector3(gridX, 0, gridZ)) < 1.1) {
                        nearTrace = true;
                        break;
                    }
                }

                // If not near trace and space empty, place tower
                if (!nearTrace && Math.abs(gridX) <= 11 && Math.abs(gridZ) <= 11) {
                    const alreadyHasTower = towers.some(t => t.gridX === gridX && t.gridZ === gridZ);
                    if (!alreadyHasTower) {
                        createTower(gridX, gridZ);
                    }
                }
            }
        });

        function createTower(gx, gz) {
            const tGroup = new THREE.Group();
            const baseGeom = new THREE.BoxGeometry(0.8, 1.5, 0.8);
            const baseMat = new THREE.MeshStandardMaterial({color: 0x8083ff, wireframe: true});
            const base = new THREE.Mesh(baseGeom, baseMat);
            base.position.y = 0.75;
            tGroup.add(base);

            const crystalGeom = new THREE.OctahedronGeometry(0.4, 0);
            const crystalMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
            const crystal = new THREE.Mesh(crystalGeom, crystalMat);
            crystal.position.y = 1.8;
            tGroup.add(crystal);

            tGroup.position.set(gx, 0, gz);
            scene.add(tGroup);

            towers.push({
                mesh: tGroup,
                crystal: crystal,
                gridX: gx,
                gridZ: gz,
                range: 4.5,
                fireCooldown: 0.8,
                cooldownTimer: 0
            });
        }

        function createExplosion(pos, color, count=10) {
            const pGroup = new THREE.Group();
            const pGeom = new THREE.BoxGeometry(0.08, 0.08, 0.08);
            const pMat = new THREE.MeshBasicMaterial({color: color});
            
            const pList = [];
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(pGeom, pMat);
                mesh.position.copy(pos);
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 4,
                    (Math.random() - 0.5) * 4,
                    (Math.random() - 0.5) * 4
                );
                pGroup.add(mesh);
                pList.push({mesh, vel});
            }
            scene.add(pGroup);
            particles.push({group: pGroup, list: pList, age: 0, life: 0.35});
        }

        // Spawn virus packet
        let spawnTimer = 0;
        function spawnVirus() {
            const geom = new THREE.SphereGeometry(0.4, 6, 6);
            const mat = new THREE.MeshBasicMaterial({color: 0xff3b30});
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(tracePoints[0]);
            
            enemies.push({
                mesh: mesh,
                targetIndex: 1,
                speed: 3.5 + Math.random()*2
            });
            scene.add(mesh);
        }

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta() * timeScale;

            cpu.rotation.y += 0.5 * delta;

            // Spawn virus packets
            spawnTimer += delta;
            if (spawnTimer > 1.5) {
                spawnVirus();
                spawnTimer = 0;
            }

            // Move Enemies along traces
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const targetPoint = tracePoints[enemy.targetIndex];
                const dir = new THREE.Vector3().subVectors(targetPoint, enemy.mesh.position);
                const dist = dir.length();

                const step = enemy.speed * delta;
                if (dist <= step) {
                    enemy.mesh.position.copy(targetPoint);
                    enemy.targetIndex++;
                    if (enemy.targetIndex >= tracePoints.length) {
                        // Reached CPU Core! Damage CPU
                        cpuHealth = Math.max(cpuHealth - 10, 0);
                        document.getElementById('cpu-val').textContent = `${cpuHealth}%`;
                        if (cpuHealth === 0) {
                            document.getElementById('cpu-val').textContent = "COMPROMISED";
                            document.getElementById('cpu-val').style.color = '#ff3b30';
                        }
                        createExplosion(enemy.mesh.position, 0xff0000, 20);
                        scene.remove(enemy.mesh);
                        enemies.splice(i, 1);
                        continue;
                    }
                } else {
                    dir.normalize();
                    enemy.mesh.position.addScaledVector(dir, step);
                }
            }

            // Tower tracking & firing
            towers.forEach(t => {
                t.crystal.rotation.y += 2.0 * delta;
                t.crystal.rotation.x += 1.0 * delta;

                t.cooldownTimer = Math.max(t.cooldownTimer - delta, 0);
                if (t.cooldownTimer === 0) {
                    // Find nearest enemy in range
                    let nearestEnemy = null;
                    let minDist = t.range;
                    enemies.forEach(e => {
                        const d = t.mesh.position.distanceTo(e.mesh.position);
                        if (d < minDist) {
                            minDist = d;
                            nearestEnemy = e;
                        }
                    });

                    if (nearestEnemy) {
                        // Fire Laser
                        const start = new THREE.Vector3().copy(t.mesh.position).add(new THREE.Vector3(0, 1.8, 0));
                        const end = nearestEnemy.mesh.position;
                        
                        const laserGeom = new THREE.BoxGeometry(0.1, 0.1, minDist);
                        laserGeom.translate(0, 0, minDist/2);
                        const laserMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
                        const laser = new THREE.Mesh(laserGeom, laserMat);
                        
                        laser.position.copy(start);
                        laser.lookAt(end);
                        scene.add(laser);
                        
                        lasers.push({
                            mesh: laser,
                            life: 0.1,
                            age: 0
                        });

                        // Damage enemy immediately
                        createExplosion(end, 0x00ffff, 6);
                        
                        // Delete enemy (one shot kill for simplicity)
                        const eIndex = enemies.indexOf(nearestEnemy);
                        if (eIndex > -1) {
                            scene.remove(nearestEnemy.mesh);
                            enemies.splice(eIndex, 1);
                            score++;
                            document.getElementById('score-val').textContent = score;
                        }

                        t.cooldownTimer = t.fireCooldown;
                    }
                }
            });

            // Fade lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                laser.age += delta;
                if (laser.age >= laser.life) {
                    scene.remove(laser.mesh);
                    lasers.splice(i, 1);
                }
            }

            // Animate particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const pObj = particles[i];
                pObj.age += delta;
                if (pObj.age >= pObj.life) {
                    scene.remove(pObj.group);
                    particles.splice(i, 1);
                } else {
                    pObj.list.forEach(p => {
                        p.mesh.position.addScaledVector(p.vel, delta);
                    });
                }
            }

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
