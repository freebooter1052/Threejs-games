<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Shift | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #080500;
            font-family: 'Courier New', Courier, monospace;
            color: #ffdcc5;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(16, 10, 5, 0.7);
            border: 1px solid rgba(255, 220, 197, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #ffb783;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 183, 131, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(16, 10, 5, 0.8);
            border: 1px solid rgba(255, 220, 197, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #ffdcc5;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">ACTIVE SPHERES</div>
            <div class="hud-value" id="spheres-val">1</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">GRAVITY VECTOR</div>
            <div class="hud-value" id="grav-val">DOWN</div>
        </div>
    </div>
    
    <div class="instructions">
        Use <span class="key">Q</span>/<span class="key">E</span> to tilt chamber, <span class="key">SPACE</span> to invert gravity, and <span class="key">Click</span> to drop spheres.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup Three.js
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x0a0702);
        container.appendChild(renderer.domElement);

        // Lights
        const light1 = new THREE.DirectionalLight(0xffdcc5, 1.0);
        light1.position.set(5, 10, 5);
        scene.add(light1);
        
        const light2 = new THREE.DirectionalLight(0xffb783, 0.5);
        light2.position.set(-5, -10, 5);
        scene.add(light2);

        const ambientLight = new THREE.AmbientLight(0x221a11);
        scene.add(ambientLight);

        // Brass Outer Cage (Clockwork)
        const cageGroup = new THREE.Group();
        const outerRingGeom = new THREE.TorusGeometry(8.5, 0.2, 8, 50);
        const cageMat = new THREE.MeshStandardMaterial({
            color: 0xd4af37, // Gold/Brass
            roughness: 0.2,
            metalness: 0.9,
            wireframe: true
        });
        const outerRing = new THREE.Mesh(outerRingGeom, cageMat);
        cageGroup.add(outerRing);

        // Gears
        const gearGeom = new THREE.CylinderGeometry(8.0, 8.0, 0.4, 24);
        gearGeom.rotateX(Math.PI/2);
        const gearMat = new THREE.MeshStandardMaterial({
            color: 0xaa7a1e,
            roughness: 0.3,
            metalness: 0.8,
            wireframe: true
        });
        const gear = new THREE.Mesh(gearGeom, gearMat);
        gear.position.z = -0.5;
        cageGroup.add(gear);
        scene.add(cageGroup);

        // Spheres array
        const spheres = [];
        const sphereRadius = 0.6;
        const sphereGeom = new THREE.SphereGeometry(sphereRadius, 16, 16);
        const marbleMat = new THREE.MeshStandardMaterial({
            color: 0xffffff,
            roughness: 0.1,
            metalness: 0.9
        });

        // Add initial sphere
        function addSphere(pos) {
            const mesh = new THREE.Mesh(sphereGeom, marbleMat);
            mesh.position.copy(pos || new THREE.Vector3(0, 4, 0));
            scene.add(mesh);
            spheres.push({
                mesh: mesh,
                vel: new THREE.Vector3(0, 0, 0)
            });
            document.getElementById('spheres-val').textContent = spheres.length;
        }

        addSphere(new THREE.Vector3(-2, 4, 0));

        // Physics variables
        let gravityDir = new THREE.Vector3(0, -9.8, 0);
        let gravityState = "DOWN";
        let cageRotation = 0;

        // Key states
        const keys = { q: false, e: false };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === ' ') {
                // Invert gravity
                if (gravityState === "DOWN") {
                    gravityDir.set(0, 9.8, 0);
                    gravityState = "UP";
                } else {
                    gravityDir.set(0, -9.8, 0);
                    gravityState = "DOWN";
                }
                // Update gravity angle based on cage tilt
                rotateGravityVector();
                document.getElementById('grav-val').textContent = gravityState;
            }
            if (k in keys) keys[k] = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k in keys) keys[k] = false;
        });

        // Click to spawn spheres
        const mouse = new THREE.Vector2();
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.at(25, target);
            target.z = 0; // lock plane

            // Limit bounds to inside the ring
            if (target.length() < 7.5) {
                addSphere(target);
            }
        });

        function rotateGravityVector() {
            const angle = cageRotation;
            const baseG = (gravityState === "DOWN") ? -9.8 : 9.8;
            // Rotate gravity vector dynamically around Z axis
            gravityDir.x = -Math.sin(angle) * baseG;
            gravityDir.y = Math.cos(angle) * baseG;
        }

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Rotate cage
            if (keys.q) {
                cageRotation += 1.2 * delta;
            } else if (keys.e) {
                cageRotation -= 1.2 * delta;
            }
            cageGroup.rotation.z = cageRotation;
            rotateGravityVector();

            // Rotate gear teeth slowly
            gear.rotation.z -= 0.1 * delta;

            // Physics loop for spheres
            for (let i = 0; i < spheres.length; i++) {
                const s = spheres[i];
                
                // Gravity acceleration
                s.vel.addScaledVector(gravityDir, delta);
                s.mesh.position.addScaledVector(s.vel, delta);

                // Collision with outer ring boundaries (Limit inside radius 8.0)
                const pos = s.mesh.position;
                const dist = pos.length();
                const limit = 8.0 - sphereRadius;

                if (dist > limit) {
                    // Normal vector pointing inward from the ring boundary
                    const normal = new THREE.Vector3().copy(pos).normalize().multiplyScalar(-1);
                    
                    // Push out of collision boundary
                    pos.copy(normal).multiplyScalar(-limit);
                    
                    // Bounce math: V_bounce = V - (1 + restitution) * (V . normal) * normal
                    const dot = s.vel.dot(normal);
                    if (dot < 0) {
                        s.vel.addScaledVector(normal, -1.6 * dot); // Restitution coefficient 0.6
                    }

                    // Friction sliding component
                    s.vel.multiplyScalar(0.98);
                }

                // Collisions between spheres
                for (let j = j = i + 1; j < spheres.length; j++) {
                    const s2 = spheres[j];
                    const distBetween = s.mesh.position.distanceTo(s2.mesh.position);
                    const minDist = sphereRadius * 2;

                    if (distBetween < minDist) {
                        // Calculate collision normal
                        const normal = new THREE.Vector3().subVectors(s2.mesh.position, s.mesh.position).normalize();
                        
                        // Push apart
                        const overlap = minDist - distBetween;
                        s.mesh.position.addScaledVector(normal, -overlap * 0.5);
                        s2.mesh.position.addScaledVector(normal, overlap * 0.5);

                        // Relative velocity
                        const relVel = new THREE.Vector3().subVectors(s2.vel, s.vel);
                        const velAlongNormal = relVel.dot(normal);

                        if (velAlongNormal < 0) {
                            // Impulse bounce scalar
                            const impulse = -(1.5 * velAlongNormal) / 2; // dividing by sum of equal masses
                            s.vel.addScaledVector(normal, -impulse);
                            s2.vel.addScaledVector(normal, impulse);
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
