<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tactics | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030406;
            font-family: 'Courier New', Courier, monospace;
            color: #d2bbff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(10, 15, 20, 0.7);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #c9aeff;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(210, 187, 255, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(10, 15, 20, 0.8);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #d2bbff;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">ACTIVE UNIT</div>
            <div class="hud-value" id="unit-val">CONE WARRIOR</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">TACTICAL TURN</div>
            <div class="hud-value" id="turn-val">PLAYER [01]</div>
        </div>
    </div>
    
    <div class="instructions">
        Rotate: <span class="key">Q</span>/<span class="key">E</span>. End Turn: <span class="key">SPACE</span>. Click unit to select, then click highlighted tiles to move.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup Three.js
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x020305);
        container.appendChild(renderer.domElement);

        // Lights
        const light1 = new THREE.DirectionalLight(0xc9aeff, 1.0);
        light1.position.set(5, 12, 5);
        scene.add(light1);

        const light2 = new THREE.DirectionalLight(0x00ffff, 0.5);
        light2.position.set(-5, -12, 5);
        scene.add(light2);

        const ambientLight = new THREE.AmbientLight(0x100818);
        scene.add(ambientLight);

        // Grid rotation group
        const gridGroup = new THREE.Group();
        scene.add(gridGroup);

        // Grid generation (Hexagonal Tiles layout)
        const tiles = [];
        const tileGeom = new THREE.CylinderGeometry(0.9, 0.9, 0.15, 6);
        const tileMatBase = new THREE.MeshStandardMaterial({
            color: 0x111c24,
            wireframe: true
        });
        
        const gridRadius = 4;
        for (let q = -gridRadius; q <= gridRadius; q++) {
            const r1 = Math.max(-gridRadius, -q - gridRadius);
            const r2 = Math.min(gridRadius, -q + gridRadius);
            for (let r = r1; r <= r2; r++) {
                // Hex coordinates to 3D Cartesian
                const x = 1.5 * q;
                const z = Math.sqrt(3) * (r + q/2);
                
                const mesh = new THREE.Mesh(tileGeom, tileMatBase.clone());
                mesh.position.set(x, 0, z);
                gridGroup.add(mesh);

                tiles.push({
                    mesh: mesh,
                    q: q,
                    r: r,
                    hasUnit: null,
                    highlighted: false
                });
            }
        }

        // Tactical units array
        const units = [];
        
        function spawnUnit(tile, type, color, name) {
            const uGroup = new THREE.Group();
            let geom;
            if (type === 'cone') geom = new THREE.ConeGeometry(0.4, 1.2, 4);
            else if (type === 'torus') geom = new THREE.TorusGeometry(0.35, 0.1, 4, 16);
            else geom = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 4);
            
            const mat = new THREE.MeshBasicMaterial({color: color, wireframe: true});
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.y = 0.6;
            if (type === 'torus') mesh.rotation.x = Math.PI/2;
            uGroup.add(mesh);

            // Set Position on tile
            uGroup.position.copy(tile.mesh.position);
            gridGroup.add(uGroup);

            const unitData = {
                mesh: uGroup,
                tile: tile,
                type: type,
                name: name,
                color: color
            };
            tile.hasUnit = unitData;
            units.push(unitData);
        }

        // Spawn default players on tiles
        spawnUnit(tiles.find(t => t.q === -2 && t.r === 2), 'cone', 0x00ffff, 'CONE WARRIOR');
        spawnUnit(tiles.find(t => t.q === 2 && t.r === -2), 'torus', 0xd2bbff, 'RING SENTINEL');
        spawnUnit(tiles.find(t => t.q === 0 && t.r === 0), 'cylinder', 0xffb783, 'COLUMN ASSASSIN');

        // Game states
        let selectedUnit = null;
        let turn = 1;
        let boardAngle = 0;

        // Keys state
        const keys = { q: false, e: false };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === ' ') {
                // End Turn
                turn = turn === 1 ? 2 : 1;
                document.getElementById('turn-val').textContent = `PLAYER [0${turn}]`;
                clearSelection();
            }
            if (k in keys) keys[k] = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k in keys) keys[k] = false;
        });

        // Raycasting selection
        const mouse = new THREE.Vector2();
        window.addEventListener('mousedown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            
            // Get intersected tiles
            const intersects = raycaster.intersectObjects(gridGroup.children, true);
            if (intersects.length > 0) {
                // Find matching tile in our data
                const firstIntersect = intersects[0].object;
                
                // Get the parent group or main tile mesh
                const clickedTile = tiles.find(t => t.mesh === firstIntersect || t.mesh === firstIntersect.parent);
                
                if (clickedTile) {
                    handleTileClick(clickedTile);
                }
            }
        });

        function handleTileClick(tile) {
            if (tile.hasUnit) {
                // Select unit
                clearHighlights();
                selectedUnit = tile.hasUnit;
                document.getElementById('unit-val').textContent = selectedUnit.name;
                
                // Highlight neighbor tiles (Hex distance 1)
                tiles.forEach(t => {
                    const dq = t.q - selectedUnit.tile.q;
                    const dr = t.r - selectedUnit.tile.r;
                    // Hex distance formula
                    if ((Math.abs(dq) + Math.abs(dr) + Math.abs(dq + dr)) / 2 === 1) {
                        if (!t.hasUnit) {
                            t.highlighted = true;
                            t.mesh.material.color.setHex(0x00ffff);
                        }
                    }
                });
            } else if (tile.highlighted && selectedUnit) {
                // Move selected unit to tile
                selectedUnit.tile.hasUnit = null;
                
                // Animate position transition smoothly
                const targetPos = tile.mesh.position;
                newPositionLerp(selectedUnit.mesh, targetPos, 0.25);

                tile.hasUnit = selectedUnit;
                selectedUnit.tile = tile;

                clearSelection();
            } else {
                clearSelection();
            }
        }

        const lerpingUnits = [];
        function newPositionLerp(mesh, target, duration) {
            lerpingUnits.push({
                mesh: mesh,
                start: new THREE.Vector3().copy(mesh.position),
                end: new THREE.Vector3().copy(target),
                duration: duration,
                elapsed: 0
            });
        }

        function clearHighlights() {
            tiles.forEach(t => {
                t.highlighted = false;
                t.mesh.material.color.setHex(0x111c24);
            });
        }

        function clearSelection() {
            selectedUnit = null;
            document.getElementById('unit-val').textContent = 'NONE';
            clearHighlights();
        }

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Rotate grid board with keys
            if (keys.q) {
                boardAngle += 1.2 * delta;
            } else if (keys.e) {
                boardAngle -= 1.2 * delta;
            }
            gridGroup.rotation.y = boardAngle;

            // Float selected unit slightly to show it's chosen
            units.forEach(u => {
                if (u === selectedUnit) {
                    u.mesh.children[0].position.y = 0.6 + Math.sin(clock.getElapsedTime() * 5.0) * 0.15;
                    u.mesh.children[0].rotation.y += 2.0 * delta;
                } else {
                    u.mesh.children[0].position.y = 0.6 + Math.sin(clock.getElapsedTime() * 1.5 + u.tile.q) * 0.05;
                }
            });

            // Smooth position translations
            for (let i = lerpingUnits.length - 1; i >= 0; i--) {
                const lerp = lerpingUnits[i];
                lerp.elapsed += delta;
                const ratio = Math.min(lerp.elapsed / lerp.duration, 1.0);
                
                // Ease out quad
                const ease = ratio * (2 - ratio);
                
                lerp.mesh.position.lerpVectors(lerp.start, lerp.end, ease);
                
                if (ratio >= 1.0) {
                    lerpingUnits.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
