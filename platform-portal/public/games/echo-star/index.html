<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Star | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030105;
            font-family: 'Courier New', Courier, monospace;
            color: #d2bbff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(10, 5, 15, 0.7);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #c9aeff;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(210, 187, 255, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(10, 5, 15, 0.8);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #d2bbff;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">SOLAR CRUISER ENERGY</div>
            <div class="hud-value" id="energy-val">100%</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">LIGHT-YEARS TRAVELED</div>
            <div class="hud-value" id="dist-val">0 LY</div>
        </div>
    </div>
    
    <div class="instructions">
        Use <span class="key">W</span>/<span class="key">S</span> to pitch, <span class="key">A</span>/<span class="key">D</span> to yaw, and hold <span class="key">SHIFT</span> to engage warp drive.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup Scene
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x030105, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(scene.fog.color);
        container.appendChild(renderer.domElement);

        // Pulsing giant star in the distance
        const pulsarGeom = new THREE.SphereGeometry(15, 16, 16);
        const pulsarMat = new THREE.MeshBasicMaterial({
            color: 0xe8dbff,
            wireframe: true,
            transparent: true,
            opacity: 0.2
        });
        const pulsar = new THREE.Mesh(pulsarGeom, pulsarMat);
        pulsar.position.set(0, 0, -180);
        scene.add(pulsar);

        // Core light of the pulsar
        const pulsarCoreGeom = new THREE.SphereGeometry(6, 8, 8);
        const pulsarCoreMat = new THREE.MeshBasicMaterial({color: 0xfff7e8, wireframe: true});
        const pulsarCore = new THREE.Mesh(pulsarCoreGeom, pulsarCoreMat);
        pulsar.add(pulsarCore);

        // Nebula Particles (Mint and Lavender colors)
        const particleCount = 400;
        const particleGeom = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        const mintColor = new THREE.Color(0xb2f5ea);
        const lavenderColor = new THREE.Color(0xe8d5ff);

        for (let i = 0; i < particleCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 80;
            positions[i + 1] = (Math.random() - 0.5) * 60;
            positions[i + 2] = -Math.random() * 200;

            const isMint = Math.random() > 0.5;
            colors[i] = isMint ? mintColor.r : lavenderColor.r;
            colors[i + 1] = isMint ? mintColor.g : lavenderColor.g;
            colors[i + 2] = isMint ? mintColor.b : lavenderColor.b;
        }

        particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.4,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });
        const particleField = new THREE.Points(particleGeom, particleMat);
        scene.add(particleField);

        // Ethereal White Translucent Starship
        const shipGroup = new THREE.Group();
        const shipGeom = new THREE.ConeGeometry(0.8, 2.5, 4);
        shipGeom.rotateX(Math.PI/2);
        const shipMat = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const ship = new THREE.Mesh(shipGeom, shipMat);
        shipGroup.add(ship);

        // Wing rings
        const ringGeom = new THREE.TorusGeometry(1.0, 0.05, 4, 32);
        const ring = new THREE.Mesh(ringGeom, shipMat);
        ring.position.set(0, 0, 0.4);
        shipGroup.add(ring);

        shipGroup.position.set(0, 0, 0);
        scene.add(shipGroup);

        // Lights
        const light = new THREE.DirectionalLight(0xffffff, 0.8);
        light.position.set(0, 5, 2);
        scene.add(light);

        // Keys state
        const keys = { w: false, s: false, a: false, d: false, shift: false };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'Shift') keys.shift = true;
            if (k in keys) keys[k] = true;
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (e.key === 'Shift') keys.shift = false;
            if (k in keys) keys[k] = false;
        });

        // Click interaction
        window.addEventListener('mousedown', () => {
            pulsar.scale.setScalar(1.5);
            setTimeout(() => pulsar.scale.setScalar(1.0), 300);
        });

        // Ship dynamics
        let speed = 25.0;
        let pitch = 0.0;
        let yaw = 0.0;
        let roll = 0.0;
        let distance = 0;
        let time = 0;

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            time += delta;

            // Pulse pulsar
            const pulse = 1.0 + Math.sin(time * 3.5) * 0.05;
            pulsarCore.scale.setScalar(pulse);

            // Speed up if warping
            if (keys.shift) {
                speed = 120.0;
                particleMat.size = 1.2;
                pulsar.position.z += 10.0 * delta;
                if (pulsar.position.z > -10) pulsar.position.z = -180;
            } else {
                speed = 25.0;
                particleMat.size = 0.4;
                pulsar.position.z = -180;
            }

            // Pitch & Yaw responses
            if (keys.w) pitch += 1.8 * delta;
            else if (keys.s) pitch -= 1.8 * delta;
            else pitch *= 0.92;

            if (keys.a) {
                yaw += 1.8 * delta;
                roll = Math.min(roll + 2 * delta, 0.5);
            } else if (keys.d) {
                yaw -= 1.8 * delta;
                roll = Math.max(roll - 2 * delta, -0.5);
            } else {
                yaw *= 0.92;
                roll *= 0.92;
            }

            // Apply translation boundaries
            shipGroup.position.x += yaw * speed * 0.1 * delta;
            shipGroup.position.y += pitch * speed * 0.1 * delta;

            shipGroup.position.x = Math.max(Math.min(shipGroup.position.x, 8), -8);
            shipGroup.position.y = Math.max(Math.min(shipGroup.position.y, 6), -6);

            // Apply ship rotations
            shipGroup.rotation.z = roll;
            shipGroup.rotation.y = yaw * 0.3;
            shipGroup.rotation.x = -pitch * 0.3;

            // Move particle field past ship
            const posAttr = particleField.geometry.attributes.position;
            const scroll = speed * delta;
            for (let i = 0; i < particleCount; i++) {
                let pz = posAttr.getZ(i);
                pz += scroll;
                if (pz > 15) {
                    pz = -200 - Math.random() * 50;
                    posAttr.setX(i, (Math.random() - 0.5) * 80);
                    posAttr.setY(i, (Math.random() - 0.5) * 60);
                }
                // Warp stretch visual
                if (keys.shift) {
                    posAttr.setZ(i, pz + 2.0); // stretch lines visual
                } else {
                    posAttr.setZ(i, pz);
                }
            }
            posAttr.needsUpdate = true;

            // Update stats
            distance += speed * delta;
            document.getElementById('dist-val').textContent = `${Math.round(distance)} LY`;

            // Draw camera spring follow
            camera.position.x = shipGroup.position.x * 0.8;
            camera.position.y = 3 + shipGroup.position.y * 0.5;
            camera.lookAt(shipGroup.position.x * 0.9, shipGroup.position.y * 0.9, -10);

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
