<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Defense | AGENT.ARCADE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #030008;
            font-family: 'Courier New', Courier, monospace;
            color: #d2bbff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .hud {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .hud-panel {
            background: rgba(12, 8, 16, 0.7);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        .hud-title {
            font-size: 10px;
            letter-spacing: 2px;
            color: #c9aeff;
            margin-bottom: 5px;
        }
        .hud-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(210, 187, 255, 0.8);
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            text-align: center;
            background: rgba(12, 8, 16, 0.8);
            border: 1px solid rgba(210, 187, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: #e5e1e4;
        }
        .key {
            background: #201f22;
            border: 1px solid #d2bbff;
            padding: 2px 6px;
            border-radius: 4px;
            margin: 0 3px;
            display: inline-block;
            font-weight: bold;
        }
    </style>
    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div class="hud">
        <div class="hud-panel">
            <div class="hud-title">CORE HEALTH</div>
            <div class="hud-value" id="health-val">100%</div>
        </div>
        <div class="hud-panel" style="text-align: right;">
            <div class="hud-title">THREATS ELIMINATED</div>
            <div class="hud-value" id="score-val">0</div>
        </div>
    </div>
    
    <div class="instructions">
        Use <span class="key">A</span>/<span class="key">D</span> or <span class="key">Mouse Move</span> to rotate shield. Click <span class="key">L-CLICK</span> to fire.
    </div>

    <div id="canvas-container"></div>

    <script>
        // Setup ThreeJS
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x050209);
        container.appendChild(renderer.domElement);

        // Stars Background
        const starsGeom = new THREE.BufferGeometry();
        const starsCount = 500;
        const starsPos = new Float32Array(starsCount * 3);
        for(let i=0; i<starsCount*3; i++) {
            starsPos[i] = (Math.random() - 0.5) * 100;
        }
        starsGeom.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6});
        const starField = new THREE.Points(starsGeom, starsMat);
        scene.add(starField);

        // Core Planet (Target)
        const planetGeom = new THREE.SphereGeometry(3.5, 16, 16);
        const planetMat = new THREE.MeshBasicMaterial({
            color: 0x6001d1,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const planet = new THREE.Mesh(planetGeom, planetMat);
        scene.add(planet);

        // Inner glowing core
        const coreGeom = new THREE.SphereGeometry(2.5, 8, 8);
        const coreMat = new THREE.MeshBasicMaterial({color: 0xd2bbff, wireframe: true});
        const core = new THREE.Mesh(coreGeom, coreMat);
        planet.add(core);

        // Shield Arc
        const shieldGroup = new THREE.Group();
        const shieldGeom = new THREE.RingGeometry(5.2, 5.7, 30, 8, 0, Math.PI * 0.4);
        shieldGeom.translate(0, 0, 0); // Keep centered
        const shieldMat = new THREE.MeshBasicMaterial({
            color: 0x8b5cf6,
            side: THREE.DoubleSide,
            wireframe: true,
            transparent: true,
            opacity: 0.7
        });
        const shield = new THREE.Mesh(shieldGeom, shieldMat);
        shield.rotation.z = -Math.PI * 0.2; // Center the arc
        shieldGroup.add(shield);
        scene.add(shieldGroup);

        // Asteroids and lasers array
        const asteroids = [];
        const lasers = [];
        const particles = [];

        // Game stats
        let health = 100;
        let score = 0;
        let shieldAngle = 0;

        // Keyboard controls
        const keys = { a: false, d: false };
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k in keys) keys[k] = true;
        });
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k in keys) keys[k] = false;
        });

        // Mouse tracking for aiming
        const mouse = new THREE.Vector2();
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Mouse rotate shield
            const angle = Math.atan2(mouse.y, mouse.x);
            shieldAngle = angle;
        });

        // Fire laser on click
        window.addEventListener('mousedown', () => {
            fireLaser();
        });

        function fireLaser() {
            // Find direction from center to mouse
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const targetPoint = new THREE.Vector3();
            raycaster.ray.at(30, targetPoint);
            targetPoint.z = 0; // Lock to 2D plane

            const dir = new THREE.Vector3().copy(targetPoint).normalize();
            
            // Create laser mesh
            const laserGeom = new THREE.BoxGeometry(0.15, 0.8, 0.15);
            laserGeom.rotateZ(Math.atan2(dir.y, dir.x) - Math.PI/2);
            const laserMat = new THREE.MeshBasicMaterial({color: 0x00ffff});
            const laser = new THREE.Mesh(laserGeom, laserMat);
            laser.position.copy(dir).multiplyScalar(4.0);
            
            lasers.push({
                mesh: laser,
                dir: dir,
                speed: 40.0
            });
            scene.add(laser);
        }

        // Particle generator
        function createExplosion(pos, color, count=15) {
            const pGroup = new THREE.Group();
            const pGeom = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const pMat = new THREE.MeshBasicMaterial({color: color});
            
            const pList = [];
            for (let i = 0; i < count; i++) {
                const mesh = new THREE.Mesh(pGeom, pMat);
                mesh.position.copy(pos);
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5,
                    (Math.random() - 0.5) * 5
                );
                pGroup.add(mesh);
                pList.push({mesh, vel});
            }
            scene.add(pGroup);
            particles.push({group: pGroup, list: pList, age: 0, life: 0.5});
        }

        // Spawn Asteroids
        let spawnTimer = 0;
        function spawnAsteroid() {
            // Pick a random angle
            const angle = Math.random() * Math.PI * 2;
            const dist = 35;
            const pos = new THREE.Vector3(Math.cos(angle)*dist, Math.sin(angle)*dist, 0);
            
            const size = 0.5 + Math.random() * 1.0;
            const geom = new THREE.DodecahedronGeometry(size, 1);
            const mat = new THREE.MeshBasicMaterial({
                color: 0xff4f4f,
                wireframe: true
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(pos);

            asteroids.push({
                mesh: mesh,
                dir: new THREE.Vector3().copy(pos).multiplyScalar(-1).normalize(),
                speed: 3.0 + Math.random() * 4.0,
                rotSpeed: new THREE.Vector3(Math.random(), Math.random(), Math.random())
            });
            scene.add(mesh);
        }

        const clock = new THREE.Clock();

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Rotate planet wireframe
            planet.rotation.y += 0.4 * delta;
            planet.rotation.x += 0.2 * delta;

            // Rotate shield based on keyboard if keys active
            if (keys.a) {
                shieldAngle += 3.5 * delta;
            } else if (keys.d) {
                shieldAngle -= 3.5 * delta;
            }
            shieldGroup.rotation.z = shieldAngle;

            // Spawn asteroids
            spawnTimer += delta;
            if (spawnTimer > 1.2) {
                spawnAsteroid();
                spawnTimer = 0;
            }

            // Move & check asteroids
            for (let i = asteroids.length - 1; i >= 0; i--) {
                const ast = asteroids[i];
                ast.mesh.position.addScaledVector(ast.dir, ast.speed * delta);
                ast.mesh.rotation.x += ast.rotSpeed.x * delta;
                ast.mesh.rotation.y += ast.rotSpeed.y * delta;

                const distToCore = ast.mesh.position.length();

                // Check collision with Shield
                if (distToCore <= 5.8 && distToCore >= 5.0) {
                    // Check angle of asteroid relative to core
                    let astAngle = Math.atan2(ast.mesh.position.y, ast.mesh.position.x);
                    if (astAngle < 0) astAngle += Math.PI * 2;
                    
                    // Normalize shieldAngle between 0 and 2PI
                    let shieldNorm = shieldAngle % (Math.PI * 2);
                    if (shieldNorm < 0) shieldNorm += Math.PI * 2;

                    // Shield width is Math.PI * 0.4
                    const halfWidth = Math.PI * 0.2;
                    let diff = Math.abs(astAngle - shieldNorm);
                    if (diff > Math.PI) diff = Math.PI * 2 - diff;

                    if (diff <= halfWidth) {
                        // HIT SHIELD! Bounce asteroid or block it
                        createExplosion(ast.mesh.position, 0x00ff88, 8);
                        scene.remove(ast.mesh);
                        asteroids.splice(i, 1);
                        score += 1;
                        document.getElementById('score-val').textContent = score;
                        continue;
                    }
                }

                // Check collision with Core
                if (distToCore <= 3.8) {
                    // Flash core color red
                    planetMat.color.setHex(0xff0000);
                    setTimeout(() => planetMat.color.setHex(0x6001d1), 100);

                    health = Math.max(health - 15, 0);
                    document.getElementById('health-val').textContent = `${health}%`;
                    if (health === 0) {
                        // Game Over action
                        document.getElementById('health-val').textContent = 'DESTROYED';
                        document.getElementById('health-val').style.color = '#ff4f4f';
                    }

                    createExplosion(ast.mesh.position, 0xff0000, 25);
                    scene.remove(ast.mesh);
                    asteroids.splice(i, 1);
                    continue;
                }
            }

            // Move lasers
            for (let i = lasers.length - 1; i >= 0; i--) {
                const laser = lasers[i];
                laser.mesh.position.addScaledVector(laser.dir, laser.speed * delta);

                // Laser limits
                if (laser.mesh.position.length() > 40) {
                    scene.remove(laser.mesh);
                    lasers.splice(i, 1);
                    continue;
                }

                // Check collision with asteroids
                let hit = false;
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    const ast = asteroids[j];
                    const d = laser.mesh.position.distanceTo(ast.mesh.position);
                    if (d < 1.8) {
                        // Explode asteroid!
                        createExplosion(ast.mesh.position, 0xff4f4f, 15);
                        scene.remove(ast.mesh);
                        asteroids.splice(j, 1);
                        
                        scene.remove(laser.mesh);
                        lasers.splice(i, 1);

                        score += 1;
                        document.getElementById('score-val').textContent = score;
                        hit = true;
                        break;
                    }
                }
            }

            // Animate explosion particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const pObj = particles[i];
                pObj.age += delta;
                if (pObj.age >= pObj.life) {
                    scene.remove(pObj.group);
                    particles.splice(i, 1);
                } else {
                    pObj.list.forEach(p => {
                        p.mesh.position.addScaledVector(p.vel, delta);
                    });
                }
            }

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Run
        animate();
    </script>
</body>
</html>
